{% extends "base.html" %}

{% block title %}
Delete Product
{% endblock %}

{% block content %}

<h2>Delete Product</h2>

<p>
Are you sure you want to delete
<strong>{{ product.name }}</strong>?
</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">
        Yes, Delete
    </button>

    <a href="{% url 'products' %}">
        Cancel
    </a>
</form>

{% endblock %}
