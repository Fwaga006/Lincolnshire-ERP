{% extends "base.html" %}

{% block title %}
{% if form.instance.pk %}
Edit Product
{% else %}
Add Product
{% endif %}
{% endblock %}

{% block content %}

<h2>
{% if form.instance.pk %}
Edit Product
{% else %}
Add Product
{% endif %}
</h2>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Save Product
    </button>

    <a href="{% url 'products' %}">
        <button type="button">
            Cancel
        </button>
    </a>

</form>

{% endblock %}
