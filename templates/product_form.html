{% extends "base.html" %}

{% block title %}Product Form{% endblock %}

{% block content %}

<h2>Add / Edit Product</h2>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Save Product
    </button>

    <a href="{% url 'products' %}">
        Cancel
    </a>

</form>

{% endblock %}
