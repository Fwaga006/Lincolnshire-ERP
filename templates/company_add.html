{% extends "base.html" %}

{% block title %}Company Form{% endblock %}

{% block content %}

<div class="card">

    <h2>Company Details</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn">
            Save Company
        </button>

        <a href="{% url 'companies' %}" class="btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
