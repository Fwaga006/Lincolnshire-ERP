{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card">

        <div class="card-header bg-danger text-white">
            Delete Purchase Requisition
        </div>

        <div class="card-body">

            <p>
                Are you sure you want to delete this purchase requisition?
            </p>

            <form method="post">

                {% csrf_token %}

                <button type="submit" class="btn btn-danger">
                    Delete
                </button>

                <a href="{% url 'purchase_requisitions' %}" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
