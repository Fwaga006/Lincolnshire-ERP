{% extends "base.html" %}

{% block title %}Departments{% endblock %}

{% block content %}

<h2>Departments</h2>

<p>
    <a href="{% url 'add_department' %}">
        + Add Department
    </a>
</p>

<table border="1" width="100%" cellpadding="10">
    <tr>
        <th>Name</th>
        <th>Actions</th>
    </tr>

    {% for department in departments %}
    <tr>
        <td>{{ department.name }}</td>
        <td>
            <a href="{% url 'edit_department' department.id %}">Edit</a> |
            <a href="{% url 'delete_department' department.id %}"
               onclick="return confirm('Delete this department?');">
                Delete
            </a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="2">No departments found.</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
