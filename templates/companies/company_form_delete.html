{% extends "base.html" %}

{% block title %}Delete Company{% endblock %}

{% block content %}

<h2>Delete Company</h2>

<p>Are you sure you want to delete this company?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<p>
    <a href="{% url 'companies' %}">Cancel</a>
</p>

{% endblock %}
