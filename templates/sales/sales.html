{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="d-flex justify-content-between mb-3">

<h2>Sales</h2>

<a href="{% url 'add_sale' %}" class="btn btn-primary">
New Sale
</a>

</div>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Customer</th>
<th>Date</th>
</tr>

{% for sale in sales %}
<tr>
<td>{{ sale.id }}</td>
<td>{{ sale.customer }}</td>
<td>{{ sale.sale_date }}</td>
</tr>
{% endfor %}

</table>

</div>

{% endblock %}
